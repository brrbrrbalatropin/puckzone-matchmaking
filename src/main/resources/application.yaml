server:
  port: 8082

spring:
  application:
    name: puckzone-matchmaking
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
management:
  endpoints:
    web:
      exposure:
        # prometheus: métricas para el Prometheus interno del environment
        # (la app es interna: el endpoint no es alcanzable desde internet).
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

puckzone:
  jwt:
    secret: ${PUCKZONE_JWT_SECRET:puckzone-dev-secret-change-me-please-32bytes-min!!}

  matchmaking:
    # Dónde vive el estado (cola, matches, salas privadas, lock):
    # memory SOLO para desarrollo local con réplica única; en Azure
    # Terraform inyecta redis — obligatorio para correr 2+ réplicas.
    store: ${MATCHMAKING_STORE:memory}
    window-base: 50
    window-growth-per-second: 25
    bot-timeout: 10s
    match-retention: 60s
    tick: 1s
    # Barrido de entradas de cola abandonadas (la cola en Redis persiste).
    queue-entry-ttl: 15m

  game:
    # Shards de game separados por comas, EN ORDEN (la posición i es el
    # shard i). Misma lista que el GAME_SHARD_URLS del gateway.
    shard-urls: ${GAME_SHARD_URLS:http://localhost:8083}
    connect-timeout: 2s
    read-timeout: 3s

  # puckzone-ranking: fuente del ELO real para la ventana de emparejamiento
  # y para el nivel del bot que viaja a game en el POST /games.
  ranking:
    base-url: ${RANKING_BASE_URL:http://localhost:8084}
    cache-ttl: 60s
