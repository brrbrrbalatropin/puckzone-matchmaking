server:
  port: 8082

spring:
  application:
    name: puckzone-matchmaking
management:
  endpoints:
    web:
      exposure:
        # prometheus: métricas para el Prometheus interno del environment
        # (la app es interna: el endpoint no es alcanzable desde internet).
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

puckzone:
  jwt:
    secret: ${PUCKZONE_JWT_SECRET:puckzone-dev-secret-change-me-please-32bytes-min!!}

  matchmaking:
    window-base: 50
    window-growth-per-second: 25
    bot-timeout: 10s
    match-retention: 60s
    tick: 1s

  game:
    base-url: ${GAME_BASE_URL:http://localhost:8083}
    connect-timeout: 2s
    read-timeout: 3s

  # puckzone-ranking: fuente del ELO real para la ventana de emparejamiento
  # y para el nivel del bot que viaja a game en el POST /games.
  ranking:
    base-url: ${RANKING_BASE_URL:http://localhost:8084}
    cache-ttl: 60s
