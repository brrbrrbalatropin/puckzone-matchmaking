name: CI/CD - PuckZone Matchmaking

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/puckzone-matchmaking

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  compile:
    name: Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile -B --no-transfer-progress

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: compile

    # Redis para los tests de integracion de los stores compartidos (cola,
    # matches, salas privadas y lock); los tests del algoritmo usan el store
    # en memoria y no lo necesitan. Sin BD: matchmaking sigue sin Postgres.
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw test -B --no-transfer-progress

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/target/surefire-reports/*.xml'
          check_name: 'Unit Test Results'
          comment_mode: always

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=inline

  # La infraestructura (Container App incluida) la administra Terraform (infra/);
  # este job solo apunta la app a la imagen recien construida. Se despliega el tag
  # del SHA (no latest) para que cada push genere una revision nueva y se pueda
  # hacer rollback a un commit exacto.
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name puckzone-matchmaking \
            --resource-group puckzone-rg \
            --image ${{ env.IMAGE_NAME }}:${GITHUB_SHA::7}

  # Analisis estatico en SonarCloud, CI-based (no Automatic Analysis): con el
  # bytecode el analizador de Java detecta mas que solo con fuentes, y el
  # quality gate queda visible en el pipeline. Los tests ya corrieron en el
  # job test, aqui solo se compila (-DskipTests).
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Historia completa del repo: Sonar atribuye codigo nuevo vs viejo.
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./mvnw -B --no-transfer-progress verify -DskipTests \
            org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=brrbrrbalatropin_puckzone-matchmaking \
            -Dsonar.organization=brrbrrbalatropin \
            -Dsonar.host.url=https://sonarcloud.io
